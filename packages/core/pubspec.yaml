name: utopia_cms
version: 0.2.3
resolution: workspace
description: Flutter CMS and admin panel toolkit - sortable, filterable CRUD tables and per-row actions over Firebase, Supabase, Hasura or any GraphQL backend.
homepage: https://github.com/Utopia-USS/utopia-cms-workspace
repository: https://github.com/Utopia-USS/utopia-cms-workspace/tree/master/packages/core
topics:
  - cms
  - admin
  - dashboard
  - crud
  - database

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  utopia_hooks: ^0.4.25
  utopia_widgets: ^0.1.2+1
  utopia_collections: ^0.1.2
  utopia_save_file: ^0.2.5
  utopia_cms_ui: ^0.1.0

  provider: ^6.1.5
  freezed_annotation: ^3.1.0
  shimmer: ^3.0.0
  country_code_picker: ^3.4.1
  fast_immutable_collections: ^11.2.0
  cross_file: ^0.3.5
  intl: ^0.20.2
  reorderables: ^0.6.0
  url_launcher: ^6.3.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  super_drag_and_drop: ^0.9.0
  file_selector: ^1.1.0

dev_dependencies:
  build_runner: ^2.3.3
  freezed: ^3.2.3
  utopia_lints: ^0.0.3+1
  flutter_test:
    sdk: flutter
