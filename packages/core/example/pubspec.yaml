name: utopia_cms_example
description: Deployable utopia_cms showcase - two pages running on stateful in-memory mock delegates.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  utopia_cms: ^0.3.0
  utopia_hooks: ^0.4.25
  flutter_svg: ^2.0.0
  flutter_portal: ^1.1.4
  fast_immutable_collections: ^11.2.0
  media_kit: ^1.2.6
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  utopia_lints: ^0.0.3+1

flutter:
  uses-material-design: true
  assets:
    - assets/cms_core_light.png
    - assets/cms_core_dark.png
    - assets/utopia_mark_light.png
    - assets/utopia_mark_dark.png
