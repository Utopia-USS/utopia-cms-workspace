name: utopia_cms_repo

environment:
  sdk: ^3.11.0

dev_dependencies:
  melos: ^7.4.0
  utopia_lints: ^0.0.3+1

workspace:
  - packages/core
  - packages/firebase
  - packages/graphql
  - packages/hasura
  - packages/supabase

melos:
  sdkPath: .fvm/flutter_sdk

  scripts:
    build_runner:build: dart run build_runner build --delete-conflicting-outputs --workspace
    build_runner:watch: dart run build_runner watch --delete-conflicting-outputs --workspace
    build_runner:clean: dart run build_runner clean --workspace
    release: melos version --yes && git push --follow-tags && melos publish --yes --no-dry-run

  command:
    bootstrap:
      hooks:
        pre: fvm use --force